name: TestPyPI

on:
  push:
    branches:
      - test-pypi

jobs:
  build_wheel_linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir cibuildwheel

      - name: Build Linux wheel
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_PLATFORM: linux
          CIBW_BUILD: "cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS: x86_64
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_ENVIRONMENT: "YGGDRASIL_JOBS=2"

      - name: Upload Linux wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: wheel-linux-cp313-x86_64
          path: wheelhouse/*.whl

  build_wheel_macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install cibuildwheel
        run: |
          python -m pip install --no-cache-dir --upgrade pip
          python -m pip install --no-cache-dir cibuildwheel

      - name: Build macOS wheel
        run: cibuildwheel --output-dir wheelhouse
        env:
          CIBW_PLATFORM: macos
          CIBW_BUILD: "cp313-*"
          CIBW_ARCHS: arm64
          CIBW_BUILD_VERBOSITY: "1"
          CIBW_ENVIRONMENT: "YGGDRASIL_JOBS=2"

      - name: Upload macOS wheel artifact
        uses: actions/upload-artifact@v5
        with:
          name: wheel-macos-cp313-arm64
          path: wheelhouse/*.whl

  publish:
    needs:
      - build_wheel_linux
      - build_wheel_macos
    runs-on: ubuntu-latest

    if: github.repository_owner == 'planning-and-learning'

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Inspect distributions
        run: find dist -maxdepth 1 -type f

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          repository-url: https://test.pypi.org/legacy/
          user: __token__
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true
